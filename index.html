<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ohuhu Honolulu · Swatch Reference</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f5f2ee;--surface:#fdfaf7;--border:#e0d8cf;--text:#2a2520;--muted:#9a8f84;--accent:#c1440e}
  body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh}
  header{padding:1.75rem 1.5rem 1.1rem;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.05)}
  .header-top{display:flex;align-items:baseline;gap:1rem;margin-bottom:.9rem;flex-wrap:wrap}
  h1{font-family:'Fraunces',serif;font-size:1.65rem;font-weight:600;letter-spacing:-.02em}
  .subtitle{font-size:.67rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
  .controls{display:flex;gap:.55rem;flex-wrap:wrap;align-items:center}
  input[type=text]{font-family:'DM Mono',monospace;font-size:.77rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:.4rem .7rem;color:var(--text);width:210px;outline:none;transition:border-color .15s}
  input[type=text]:focus{border-color:var(--accent)}
  input[type=text]::placeholder{color:var(--muted)}
  select{font-family:'DM Mono',monospace;font-size:.75rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:.4rem .5rem;color:var(--text);cursor:pointer;outline:none}
  .btn-group{display:flex}
  .tog-btn{font-family:'DM Mono',monospace;font-size:.71rem;background:var(--bg);border:1px solid var(--border);padding:.36rem .58rem;cursor:pointer;color:var(--muted);transition:all .12s;white-space:nowrap;line-height:1}
  .tog-btn:first-child{border-radius:4px 0 0 4px}
  .tog-btn:last-child{border-radius:0 4px 4px 0;border-left:none}
  .tog-btn:not(:first-child):not(:last-child){border-left:none}
  .tog-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);z-index:1}
  .count{font-size:.67rem;color:var(--muted);margin-left:auto}
  /* layout */
  .layout{display:flex}
  .family-nav{width:192px;min-width:192px;background:var(--surface);border-right:1px solid var(--border);position:sticky;top:108px;height:calc(100vh - 108px);overflow-y:auto;display:none;flex-direction:column;scrollbar-width:thin}
  .family-nav.visible{display:flex}
  .fam-item{display:flex;align-items:center;gap:.45rem;padding:.45rem .65rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;text-decoration:none}
  .fam-item:hover{background:var(--bg)}
  .fam-item.active{background:var(--bg);box-shadow:inset 3px 0 0 var(--accent)}
  .fam-swatch{width:15px;height:15px;border-radius:3px;flex-shrink:0;border:1px solid rgba(0,0,0,.08)}
  .fam-label{font-size:.63rem;line-height:1.3;color:var(--text);min-width:0}
  .fam-code{font-weight:500;font-size:.67rem}
  .fam-desc{font-size:.57rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fam-count{font-size:.57rem;color:var(--muted);margin-left:auto;flex-shrink:0}
  /* main */
  .main{flex:1;min-width:0}
  .group-section{scroll-margin-top:125px}
  .group-header{padding:.75rem 1.1rem .55rem;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;gap:.65rem;position:sticky;top:108px;z-index:50}
  .group-header-swatch{width:22px;height:22px;border-radius:4px;border:1px solid rgba(0,0,0,.1);flex-shrink:0}
  .group-title{font-family:'Fraunces',serif;font-size:.95rem;font-weight:600}
  .group-desc{font-size:.62rem;color:var(--muted)}
  .group-count{font-size:.63rem;color:var(--muted);margin-left:auto}
  /* grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:1px;background:var(--border)}
  .swatch{background:var(--surface);cursor:pointer;position:relative;display:flex;flex-direction:column;transition:transform .12s;z-index:1}
  .swatch:hover{transform:scale(1.05);z-index:10;box-shadow:0 6px 24px rgba(0,0,0,.18)}
  .color-block{width:100%;aspect-ratio:1;position:relative}
  .copy-flash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.59rem;font-weight:500;letter-spacing:.03em;background:rgba(0,0,0,.3);color:#fff;opacity:0;transition:opacity .1s;pointer-events:none}
  .swatch:hover .copy-flash{opacity:1}
  .swatch-info{padding:.32rem .42rem .38rem;background:var(--surface);border-top:1px solid var(--border)}
  .swatch-code{font-size:.61rem;font-weight:500;color:var(--accent);letter-spacing:.03em;line-height:1.3}
  .swatch-name{font-size:.57rem;color:var(--text);line-height:1.35;margin-top:.07rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .swatch-hex{font-size:.55rem;color:var(--muted);margin-top:.07rem}
  .swatch-old{font-size:.53rem;color:var(--muted);margin-top:.04rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* list view */
  body.list-view .grid{grid-template-columns:1fr;gap:0;background:none}
  body.list-view .swatch{flex-direction:row;align-items:center;border-bottom:1px solid var(--border)}
  body.list-view .swatch:hover{transform:none;box-shadow:inset 3px 0 0 var(--accent)}
  body.list-view .color-block{width:50px;min-width:50px;aspect-ratio:1;flex-shrink:0}
  body.list-view .swatch-info{border-top:none;border-left:1px solid var(--border);display:flex;align-items:center;gap:1.1rem;padding:.42rem .85rem;flex:1}
  body.list-view .swatch-code{min-width:56px}
  body.list-view .swatch-name{flex:1;white-space:normal;font-size:.67rem}
  body.list-view .swatch-hex,body.list-view .swatch-old{margin-top:0}
  /* toast */
  .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);font-size:.71rem;padding:.48rem 1rem;border-radius:4px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;letter-spacing:.04em}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .no-results{padding:4rem 2rem;text-align:center;color:var(--muted);font-size:.8rem;display:none}
</style>
</head>

const FAMILIES={Special:{label:“Special”,desc:“Blender & Black”,order:0},Y:{label:“Y”,desc:“Yellow”,order:1},YR:{label:“YR”,desc:“Yellow-Red · Oranges”,order:2},R:{label:“R”,desc:“Red · Pinks”,order:3},RV:{label:“RV”,desc:“Red-Violet · Magentas”,order:4},V:{label:“V”,desc:“Violet · Purples”,order:5},BV:{label:“BV”,desc:“Blue-Violet · Periwinkles”,order:6},B:{label:“B”,desc:“Blue · Ceruleans”,order:7},BG:{label:“BG”,desc:“Blue-Green · Teals”,order:8},G:{label:“G”,desc:“Green · Emeralds”,order:9},YG:{label:“YG”,desc:“Yellow-Green · Limes”,order:10},E:{label:“E”,desc:“Earth · Browns & Skin”,order:11},FY:{label:“FY”,desc:“Fluorescent”,order:12},CG:{label:“CG”,desc:“Cool Grey”,order:13},GG:{label:“GG”,desc:“Green-Grey”,order:14},BGY:{label:“BGY”,desc:“Blue-Grey”,order:15},WG:{label:“WG”,desc:“Warm Grey”,order:16},YGY:{label:“YGY”,desc:“Yellow-Grey”,order:17}};

function getFamily(code){if(code===‘0’||code===‘120’)return’Special’;const m=code.match(/^([A-Za-z]+)/);return m?m[1].toUpperCase():‘Special’;}
COLORS.forEach(c=>c.family=getFamily(c.code));

function hexToHSL(h){let r=parseInt(h.slice(0,2),16)/255,g=parseInt(h.slice(2,4),16)/255,b=parseInt(h.slice(4,6),16)/255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let hh,s,l=(mx+mn)/2;if(mx===mn){hh=s=0;}else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:hh=((g-b)/d+(g<b?6:0))/6;break;case g:hh=((b-r)/d+2)/6;break;case b:hh=((r-g)/d+4)/6;break;}}return{h:hh*360,s:s*100,l:l*100};}
function brightness(h){const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return(r*299+g*587+b*114)/1000;}
function textColor(h){return brightness(h)>155?’#2a2520’:’#fff’;}
function sortColors(arr,by){return[…arr].sort((a,b)=>{if(by===‘name’)return a.name.localeCompare(b.name);if(by===‘hue’)return hexToHSL(a.hex).h-hexToHSL(b.hex).h;if(by===‘brightness’)return brightness(b.hex)-brightness(a.hex);if(by===‘oldcode’)return a.oldCode.localeCompare(b.oldCode);return a.code.localeCompare(b.code);});}

let filtered=[…COLORS],currentSort=‘code’,grouped=false;

function makeSwatch(c){
const el=document.createElement(‘div’);
el.className=‘swatch’;
el.innerHTML=`<div class="color-block" style="background:#${c.hex}"><div class="copy-flash">copy #${c.hex}</div></div><div class="swatch-info"><div class="swatch-code">${c.code}</div><div class="swatch-name">${c.name}</div><div class="swatch-hex">#${c.hex}</div><div class="swatch-old">old: ${c.oldCode}</div></div>`;
el.addEventListener(‘click’,()=>copyHex(c.hex,c.name));
return el;
}
function makeGrid(colors){
const g=document.createElement(‘div’);g.className=‘grid’;
sortColors(colors,currentSort).forEach(c=>g.appendChild(makeSwatch(c)));
return g;
}
function famRep(colors){const s=[…colors].sort((a,b)=>brightness(a.hex)-brightness(b.hex));return s[Math.floor(s.length/2)].hex;}

function render(){
const content=document.getElementById(‘content’),noR=document.getElementById(‘no-results’),nav=document.getElementById(‘familyNav’);
content.innerHTML=’’;nav.innerHTML=’’;
if(filtered.length===0){noR.style.display=‘block’;document.getElementById(‘count’).textContent=‘0 shown’;nav.classList.remove(‘visible’);return;}
noR.style.display=‘none’;
document.getElementById(‘count’).textContent=`${filtered.length} shown`;
if(!grouped){nav.classList.remove(‘visible’);content.appendChild(makeGrid(filtered));return;}
nav.classList.add(‘visible’);
const famMap={};
filtered.forEach(c=>{(famMap[c.family]=famMap[c.family]||[]).push(c);});
const famOrder=Object.keys(famMap).sort((a,b)=>((FAMILIES[a]||{order:99}).order)-((FAMILIES[b]||{order:99}).order));
// sidebar
famOrder.forEach(fam=>{
const meta=FAMILIES[fam]||{label:fam,desc:’’,order:99};
const rep=famRep(famMap[fam]);
const item=document.createElement(‘a’);item.className=‘fam-item’;item.href=`#fam-${fam}`;
item.innerHTML=`<div class="fam-swatch" style="background:#${rep}"></div><div class="fam-label"><div class="fam-code">${meta.label}</div><div class="fam-desc">${meta.desc}</div></div><span class="fam-count">${famMap[fam].length}</span>`;
nav.appendChild(item);
});
// sections
famOrder.forEach(fam=>{
const meta=FAMILIES[fam]||{label:fam,desc:’’,order:99};
const rep=famRep(famMap[fam]);
const section=document.createElement(‘div’);section.className=‘group-section’;section.id=`fam-${fam}`;
const hdr=document.createElement(‘div’);hdr.className=‘group-header’;
hdr.innerHTML=`<div class="group-header-swatch" style="background:#${rep}"></div><div><div class="group-title">${meta.label} <span style="font-weight:300;font-size:.82rem;font-family:'DM Mono',monospace"> ${meta.desc}</span></div></div><span class="group-count">${famMap[fam].length} colors</span>`;
section.appendChild(hdr);section.appendChild(makeGrid(famMap[fam]));
content.appendChild(section);
});
// active scroll spy
const sections=content.querySelectorAll(’.group-section’);
const obs=new IntersectionObserver(entries=>{
entries.forEach(e=>{if(e.isIntersecting){const id=e.target.id.replace(‘fam-’,’’);nav.querySelectorAll(’.fam-item’).forEach(el=>el.classList.toggle(‘active’,el.getAttribute(‘href’)===`#fam-${id}`));}});
},{threshold:.05,rootMargin:’-110px 0px -65% 0px’});
sections.forEach(s=>obs.observe(s));
}

document.getElementById(‘search’).addEventListener(‘input’,function(){
const q=this.value.toLowerCase().trim();
filtered=q?COLORS.filter(c=>c.name.toLowerCase().includes(q)||c.code.toLowerCase().includes(q)||c.oldCode.toLowerCase().includes(q)||c.hex.includes(q.replace(’#’,’’))||c.family.toLowerCase().includes(q)):[…COLORS];
render();
});
document.getElementById(‘sort’).addEventListener(‘change’,function(){currentSort=this.value;render();});
function setGroup(on){grouped=on;document.getElementById(‘btn-flat’).classList.toggle(‘active’,!on);document.getElementById(‘btn-group’).classList.toggle(‘active’,on);render();}
function setView(v){document.body.classList.toggle(‘list-view’,v===‘list’);document.getElementById(‘btn-grid’).classList.toggle(‘active’,v===‘grid’);document.getElementById(‘btn-list’).classList.toggle(‘active’,v===‘list’);}
function copyHex(hex,name){navigator.clipboard.writeText(’#’+hex).then(()=>showToast(`copied #${hex} · ${name}`));}
let toastTimer;
function showToast(msg){const t=document.getElementById(‘toast’);t.textContent=msg;t.classList.add(‘show’);clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove(‘show’),1800);}
render();
</script>
