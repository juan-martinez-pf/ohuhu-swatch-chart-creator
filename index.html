<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ohuhu Honolulu · Swatch Reference</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#faf5f0;--surface:#fff;--border:#e8ddd4;--text:#3a2e26;--muted:#8a7d73;--accent:#d4726a;--accent-soft:#f2c4c0;--pastel-pink:#fce4ec;--pastel-lilac:#ede7f6;--pastel-mint:#e0f2f1;--pastel-peach:#fff3e0}
  body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh}
  header{padding:1.2rem 1.2rem 1rem;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(180,140,120,.1)}
  .header-top{display:flex;align-items:baseline;gap:.75rem;margin-bottom:.75rem;flex-wrap:wrap}
  h1{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:600;letter-spacing:-.02em;color:var(--accent)}
  .subtitle{font-size:.72rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
  .controls{display:flex;gap:.6rem;flex-wrap:wrap;align-items:stretch}
  .ctrl-group{display:flex;align-items:center;gap:.3rem}
  .ctrl-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:500;white-space:nowrap}
  input[type=text]{font-family:'DM Mono',monospace;font-size:.8rem;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:.45rem .75rem;color:var(--text);width:200px;outline:none;transition:border-color .15s,box-shadow .15s}
  input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  input[type=text]::placeholder{color:var(--muted)}
  select{font-family:'DM Mono',monospace;font-size:.78rem;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:.45rem .5rem;color:var(--text);cursor:pointer;outline:none;transition:border-color .15s}
  select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .btn-group{display:flex}
  .tog-btn{font-family:'DM Mono',monospace;font-size:.74rem;background:var(--bg);border:1.5px solid var(--border);padding:.42rem .65rem;cursor:pointer;color:var(--text);transition:all .12s;white-space:nowrap;line-height:1}
  .tog-btn:first-child{border-radius:8px 0 0 8px}
  .tog-btn:last-child{border-radius:0 8px 8px 0;border-left:none}
  .tog-btn:not(:first-child):not(:last-child){border-left:none}
  .tog-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);z-index:1}
  .count{font-size:.72rem;color:var(--muted);margin-left:auto;white-space:nowrap}
  /* layout */
  .layout{display:flex}
  /* family toolbar */
  .family-toolbar{display:none;flex-wrap:wrap;gap:.4rem;padding:.6rem 1.1rem;border-bottom:1px solid var(--border);background:var(--pastel-lilac);align-items:center;position:sticky;z-index:90}
  .family-toolbar.visible{display:flex}
  .fam-chip{display:inline-flex;align-items:center;gap:.3rem;padding:.28rem .55rem .28rem .38rem;border:1.5px solid var(--border);border-radius:14px;cursor:pointer;font-size:.65rem;font-family:'DM Mono',monospace;font-weight:500;color:var(--text);background:var(--surface);transition:all .12s;line-height:1;white-space:nowrap}
  .fam-chip:hover{border-color:var(--accent);background:var(--pastel-pink)}
  .fam-chip.off{opacity:.35;border-color:transparent}
  .fam-chip .chip-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.08)}
  .fam-all-none{display:inline-flex;gap:0;margin-right:.3rem}
  .fam-all-none .tog-btn{font-size:.62rem;padding:.25rem .5rem}
  /* print panel */
  .print-panel{display:none;flex-wrap:wrap;gap:.6rem;padding:.6rem 1.1rem;border-bottom:1px solid var(--border);background:var(--pastel-mint);align-items:center;position:sticky;top:0;z-index:89}
  .print-panel.visible{display:flex}
  /* print preview */
  body.print-preview .main{background:#dadada;padding:1.5rem 0}
  body.print-preview .layout{background:#dadada}
  .page{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2);overflow:hidden;padding:.4in;position:relative;transform-origin:top left}
  .page-wrap{margin:1rem auto;overflow:hidden}
  .page .grid{background:#fff}
  .page .swatch{background:#fff;border-radius:0;cursor:default;pointer-events:none}
  .page .swatch:hover{transform:none;box-shadow:none}
  .page .copy-flash{display:none}
  .page .group-header{background:#fff;border-bottom:none}
  .page-num{position:absolute;bottom:.2in;right:.4in;font-size:.5rem;color:var(--muted)}
  /* unfilled */
  body.unfilled .color-block{background:#fff !important}
  /* label positions */
  body.label-above .swatch{flex-direction:column-reverse}
  body.label-left .grid,body.label-right .grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  body.label-left .swatch,body.label-right .swatch{flex-direction:row;align-items:center}
  body.label-left .swatch{flex-direction:row-reverse}
  body.label-left .swatch-info,body.label-right .swatch-info{flex:1;padding:.3rem .6rem}
  body.label-left .swatch-info{text-align:right}
  body.label-right .swatch-info{text-align:left}
  body.label-left .color-wrap,body.label-right .color-wrap{width:50px;min-width:50px;flex-shrink:0}
  body.label-left .color-block,body.label-right .color-block{width:50px;min-width:50px;aspect-ratio:1}
  body.label-inside .color-wrap{position:relative}
  body.label-inside .swatch-info{position:absolute;inset:0;background:none;border-top:none;padding:.25rem .4rem;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2}
  body.label-inside .swatch-name{white-space:normal;text-align:center}
  body.unfilled.label-inside .swatch-code,body.unfilled.label-inside .swatch-name,body.unfilled.label-inside .swatch-hex,body.unfilled.label-inside .swatch-old{color:#2a2520}
  body.label-none .swatch-info{display:none}
  /* inside label offsets for specific shapes */
  body.label-inside .swatch[data-shape="heart"] .swatch-info{margin-top:-1.8em}
  body.label-inside .swatch[data-shape="bear"] .swatch-info,body.label-inside .swatch[data-shape="cat"] .swatch-info{margin-top:1.8em}
  /* shapes */
  .color-block{box-shadow:inset 0 0 0 1.5px #2a2520}
  .shape-circle{border-radius:50%;overflow:hidden}
  .shape-clip{overflow:hidden}
  .color-wrap{position:relative}
  .shape-outline{position:absolute;inset:0;pointer-events:none}
  .shape-outline svg{width:100%;height:100%}
  /* main */
  .main{flex:1;min-width:0;background:var(--surface)}
  .group-section{scroll-margin-top:125px}
  .group-header{padding:.65rem 1.1rem .45rem;display:flex;align-items:center;gap:.45rem;background:var(--pastel-peach);border-bottom:1px solid var(--border)}
  .group-title{font-family:'Fraunces',serif;font-size:.9rem;font-weight:600;color:var(--text)}
  .group-count{font-size:.68rem;color:var(--muted);margin-left:auto}
  /* grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:1px;background:var(--surface)}
  .swatch{background:var(--surface);cursor:pointer;position:relative;display:flex;flex-direction:column;transition:transform .12s,box-shadow .12s;z-index:1;border-radius:4px;overflow:hidden}
  .swatch:hover{transform:scale(1.04);z-index:10;box-shadow:0 6px 20px rgba(180,140,120,.22)}
  .color-block{width:100%;aspect-ratio:1;position:relative}
  .copy-flash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:500;letter-spacing:.03em;background:rgba(0,0,0,.25);color:#fff;opacity:0;transition:opacity .1s;pointer-events:none;border-radius:4px}
  .swatch:hover .copy-flash{opacity:1}
  .swatch-info{padding:.35rem .45rem .4rem;text-align:center}
  .swatch-code{font-size:.66rem;font-weight:500;color:var(--text);letter-spacing:.03em;line-height:1.3}
  .swatch-name{font-size:.62rem;color:var(--text);line-height:1.35;margin-top:.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .swatch-hex{font-size:.6rem;color:var(--text);margin-top:.1rem}
  .swatch-old{font-size:.58rem;color:var(--text);margin-top:.06rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .set-toggles .tog-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  /* toast */
  .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:#fff;font-size:.74rem;padding:.55rem 1.1rem;border-radius:10px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;letter-spacing:.04em;box-shadow:0 4px 16px rgba(0,0,0,.15)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .no-results{padding:4rem 2rem;text-align:center;color:var(--muted);font-size:.85rem;display:none}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <h1>Ohuhu Swatch Chart Creator <span style="font-size:.55em;font-weight:300;color:var(--muted)">v32</span></h1>
    <span class="subtitle" id="subtitle">Swatch Reference · 364 colors</span>
  </div>
  <div class="controls">
    <div class="ctrl-group">
      <span class="ctrl-label">Search</span>
      <input type="text" id="search" placeholder="name, code, hex, family…" autocomplete="off">
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Sort</span>
      <select id="sort">
        <option value="code">new code</option>
        <option value="name">name A–Z</option>
        <option value="hue">hue</option>
        <option value="brightness">brightness</option>
        <option value="sat-brt">saturation → brightness</option>
        <option value="brt-sat">brightness → saturation</option>
        <option value="hue-brt">hue → brightness</option>
        <option value="hue-sat">hue → saturation</option>
        <option value="fam-sat">family → saturation</option>
        <option value="fam-brt">family → brightness</option>
        <option value="oldcode">old code</option>
      </select>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Set</span>
      <div class="btn-group set-toggles">
        <button class="tog-btn active" id="btn-honolulu" onclick="toggleSet('honolulu')">Honolulu</button>
        <button class="tog-btn" id="btn-oahu" onclick="toggleSet('oahu')">Oahu</button>
        <button class="tog-btn" id="btn-kaala" onclick="toggleSet('kaala')">Kaala</button>
      </div>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Group</span>
      <div class="btn-group">
        <button class="tog-btn active" id="btn-flat" onclick="setGroup(false)">flat</button>
        <button class="tog-btn" id="btn-group" onclick="setGroup(true)">by family</button>
      </div>
    </div>
    <button class="tog-btn" id="btn-print" onclick="togglePrintPanel()" style="border-radius:8px">Print Preview</button>
    <span class="count" id="count">364 shown</span>
  </div>
</header>
<div class="family-toolbar" id="familyToolbar"></div>
<div class="print-panel" id="printPanel">
  <div class="ctrl-group">
    <span class="ctrl-label">Page</span>
    <select id="pageSize" onchange="setPrintSetting('pageSize',this.value)">
      <option value="card">Card 2.5 × 3.5 in</option>
      <option value="a5">A5 5.8 × 8.3 in</option>
      <option value="letter" selected>Letter 8.5 × 11 in</option>
      <option value="a4">A4 8.3 × 11.7 in</option>
      <option value="legal">Legal 8.5 × 14 in</option>
      <option value="tabloid">Tabloid 11 × 17 in</option>
    </select>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Filled</span>
    <div class="btn-group">
      <button class="tog-btn active" id="btn-filled-yes" onclick="toggleFilled(true)">Yes</button>
      <button class="tog-btn" id="btn-filled-no" onclick="toggleFilled(false)">No</button>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Label</span>
    <select id="labelPos" onchange="setLabelPos(this.value)">
      <option value="below" selected>Below</option>
      <option value="above">Above</option>
      <option value="left">Left</option>
      <option value="right">Right</option>
      <option value="inside">Inside</option>
      <option value="none">None</option>
    </select>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Info</span>
    <div class="btn-group">
      <button class="tog-btn active" id="btn-li-code" onclick="toggleLabelInfo('code')">Code</button>
      <button class="tog-btn active" id="btn-li-name" onclick="toggleLabelInfo('name')">Name</button>
      <button class="tog-btn active" id="btn-li-hex" onclick="toggleLabelInfo('hex')">Hex</button>
      <button class="tog-btn active" id="btn-li-old" onclick="toggleLabelInfo('old')">Old</button>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Shape</span>
    <select id="swatchShape" onchange="setShape(this.value)">
      <option value="square" selected>Square</option>
      <option value="circle">Circle</option>
      <option value="heart">Heart</option>
      <option value="puppy">Puppy</option>
      <option value="cat">Cat</option>
      <option value="bear">Bear</option>
      <option value="tomato">Tomato</option>
      <option value="mixed">Mixed</option>
    </select>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Spacing</span>
    <div class="btn-group" id="spacingGroup">
      <button class="tog-btn active" id="btn-sp-close" onclick="setSpacing('close')">Close</button>
      <button class="tog-btn" id="btn-sp-medium" onclick="setSpacing('medium')">Medium</button>
      <button class="tog-btn" id="btn-sp-wide" onclick="setSpacing('wide')">Wide</button>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Force 1 Page</span>
    <div class="btn-group">
      <button class="tog-btn active" id="btn-f1p-off" onclick="setForce1Page(false)">Off</button>
      <button class="tog-btn" id="btn-f1p-on" onclick="setForce1Page(true)">On</button>
    </div>
  </div>
</div>
<svg style="position:absolute;width:0;height:0"><defs id="shapeDefs"></defs></svg>
<div class="layout">
  <div class="main">
    <div id="content"></div>
    <div class="no-results" id="no-results">no colors match</div>
  </div>
</div>
<div class="toast" id="toast"></div>

  a5:{w:5.8,h:8.3,label:'A5'},
  letter:{w:8.5,h:11,label:'Letter'},
  a4:{w:8.3,h:11.7,label:'A4'},
  legal:{w:8.5,h:14,label:'Legal'},
  tabloid:{w:11,h:17,label:'Tabloid'}
};

function getFamily(code){if(code==='0'||code==='120')return'Special';const m=code.match(/^([A-Za-z]+)/);return m?m[1].toUpperCase():'Special';}
COLORS.forEach(c=>c.family=getFamily(c.code));

function hexToHSL(h){let r=parseInt(h.slice(0,2),16)/255,g=parseInt(h.slice(2,4),16)/255,b=parseInt(h.slice(4,6),16)/255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let hh,s,l=(mx+mn)/2;if(mx===mn){hh=s=0;}else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:hh=((g-b)/d+(g<b?6:0))/6;break;case g:hh=((b-r)/d+2)/6;break;case b:hh=((r-g)/d+4)/6;break;}}return{h:hh*360,s:s*100,l:l*100};}
function brightness(h){const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return(r*299+g*587+b*114)/1000;}
function textColor(h){return brightness(h)>155?'#2a2520':'#fff';}
function codeSat(c){const m=c.code.match(/^[A-Za-z]+(\d)/);return m?parseInt(m[1]):0;}
function codeBrt(c){const m=c.code.match(/^[A-Za-z]+\d(\d+)$/);return m?parseInt(m[1]):0;}
function sortColors(arr,by){return[...arr].sort((a,b)=>{
if(by==='name')return a.name.localeCompare(b.name);
if(by==='hue')return hexToHSL(a.hex).h-hexToHSL(b.hex).h;
if(by==='brightness')return brightness(b.hex)-brightness(a.hex);
if(by==='oldcode')return a.oldCode.localeCompare(b.oldCode);
if(by==='sat-brt')return codeSat(a)-codeSat(b)||codeBrt(a)-codeBrt(b);
if(by==='brt-sat')return codeBrt(a)-codeBrt(b)||codeSat(a)-codeSat(b);
if(by==='hue-brt')return hexToHSL(a.hex).h-hexToHSL(b.hex).h||brightness(b.hex)-brightness(a.hex);
if(by==='hue-sat'){const h=hexToHSL(a.hex).h-hexToHSL(b.hex).h;return h||hexToHSL(b.hex).s-hexToHSL(a.hex).s;}
if(by==='fam-sat')return((FAMILIES[a.family]||{order:99}).order)-((FAMILIES[b.family]||{order:99}).order)||codeSat(a)-codeSat(b)||codeBrt(a)-codeBrt(b);
if(by==='fam-brt')return((FAMILIES[a.family]||{order:99}).order)-((FAMILIES[b.family]||{order:99}).order)||codeBrt(a)-codeBrt(b)||codeSat(a)-codeSat(b);
return a.code.localeCompare(b.code);});}

let activeSets=new Set(['honolulu']);
let activeFamilies=new Set(Object.keys(FAMILIES));
let filtered=[...COLORS].filter(c=>c.sets.some(s=>activeSets.has(s)));
let currentSort='code',grouped=false;

function toggleSet(set){
  if(activeSets.has(set)){
    if(activeSets.size===1)return;
    activeSets.delete(set);
  }else{
    activeSets.add(set);
  }
  document.getElementById('btn-honolulu').classList.toggle('active',activeSets.has('honolulu'));
  document.getElementById('btn-oahu').classList.toggle('active',activeSets.has('oahu'));
  document.getElementById('btn-kaala').classList.toggle('active',activeSets.has('kaala'));
  applyFilters();
}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const base=COLORS.filter(c=>c.sets.some(s=>activeSets.has(s)));
  filtered=q?base.filter(c=>c.name.toLowerCase().includes(q)||c.code.toLowerCase().includes(q)||c.oldCode.toLowerCase().includes(q)||c.hex.includes(q.replace('#',''))||c.family.toLowerCase().includes(q)):base;
  updateSubtitle();
  render();
}

function updateSubtitle(){
  const setNames=[...activeSets].map(s=>s.charAt(0).toUpperCase()+s.slice(1));
  const base=COLORS.filter(c=>c.sets.some(s=>activeSets.has(s)));
  document.getElementById('subtitle').textContent=setNames.join(' + ')+' · '+base.length+' colors';
}

function toggleFamily(fam){
  if(activeFamilies.has(fam))activeFamilies.delete(fam);else activeFamilies.add(fam);
  updateFamChips();
  applyFilters();
}
function setAllFamilies(on){
  if(on)activeFamilies=new Set(Object.keys(FAMILIES));else activeFamilies.clear();
  updateFamChips();
  applyFilters();
}
function updateFamChips(){
  document.querySelectorAll('.fam-chip').forEach(el=>{
    el.classList.toggle('off',!activeFamilies.has(el.dataset.fam));
  });
}

// print settings
const printSettings={pageSize:'letter',filled:true,labelPos:'below',labelInfo:{code:true,name:true,hex:true,old:true},shape:'square',spacing:'close',force1Page:false};
const SHAPES=['heart','puppy','cat','bear','tomato'];

let printPanelOpen=false;
function togglePrintPanel(){
  printPanelOpen=!printPanelOpen;
  document.getElementById('printPanel').classList.toggle('visible',printPanelOpen);
  document.getElementById('btn-print').classList.toggle('active',printPanelOpen);
  document.body.classList.toggle('print-preview',printPanelOpen);
  render();
  updateStickyTops();
}
function setPrintSetting(key,val){printSettings[key]=val;render();}
function toggleFilled(on){
  printSettings.filled=on;
  document.getElementById('btn-filled-yes').classList.toggle('active',on);
  document.getElementById('btn-filled-no').classList.toggle('active',!on);
  document.body.classList.toggle('unfilled',!on);
  if(!on){
    printSettings.labelInfo.hex=false;
    document.getElementById('btn-li-hex').classList.remove('active');
  }
  render();
}
function setLabelPos(pos){
  printSettings.labelPos=pos;
  document.body.classList.remove('label-above','label-left','label-right','label-inside','label-none');
  if(pos!=='below')document.body.classList.add('label-'+pos);
  render();
}
function toggleLabelInfo(field){
  printSettings.labelInfo[field]=!printSettings.labelInfo[field];
  document.getElementById('btn-li-'+field).classList.toggle('active',printSettings.labelInfo[field]);
  render();
}
function setShape(shape){
  printSettings.shape=shape;
  render();
}
function setSpacing(sp){
  printSettings.spacing=sp;
  document.getElementById('btn-sp-close').classList.toggle('active',sp==='close');
  document.getElementById('btn-sp-medium').classList.toggle('active',sp==='medium');
  document.getElementById('btn-sp-wide').classList.toggle('active',sp==='wide');
  render();
}
function setForce1Page(on){
  printSettings.force1Page=on;
  document.getElementById('btn-f1p-off').classList.toggle('active',!on);
  document.getElementById('btn-f1p-on').classList.toggle('active',on);
  document.getElementById('spacingGroup').style.opacity=on?'.4':'1';
  document.getElementById('spacingGroup').style.pointerEvents=on?'none':'auto';
  render();
}
function getShapeClass(idx,code){
  const s=printSettings.shape;
  if(s==='square')return'';
  if(s==='circle')return'shape-circle';
  if(s==='mixed'){
    let h=0;const key=code||String(idx);for(let i=0;i<key.length;i++){h=Math.imul(31,h)+key.charCodeAt(i)|0;}
    if((h>>>0)%5===0)return'shape-clip shape-'+SHAPES[(h>>>0)%SHAPES.length];
    return'shape-circle';
  }
  return'shape-clip shape-'+s;
}

// load external SVG shapes
const shapePaths={};
function loadShapes(){
  const defs=document.getElementById('shapeDefs');
  SHAPES.forEach(name=>{
    fetch('shapes/'+name+'.svg').then(r=>r.text()).then(svg=>{
      const tmp=document.createElement('div');tmp.innerHTML=svg;
      const clipPath=tmp.querySelector('clipPath');
      if(clipPath){
        clipPath.id='shape-'+name;defs.appendChild(clipPath);
        const p=clipPath.querySelector('path');
        if(p)shapePaths[name]=p.getAttribute('d');
      }
    }).catch(()=>{});
  });
}

function makeSwatch(c,idx){
const el=document.createElement('div');
const shapeClass=getShapeClass(idx||0,c.code);
const shapeName=shapeClass.replace('shape-clip shape-','');
el.className='swatch';
if(shapeClass.includes('shape-clip'))el.dataset.shape=shapeName;
const clipStyle=shapeClass.includes('shape-clip')?'clip-path:url(#'+shapeClass.split(' ').pop()+')':'';
const oldDisplay=activeSets.size===1?'old: '+c.oldCode:Object.entries(c.oldCodes).map(([s,v])=>s.slice(0,3)+': '+v).join(' · ');
const li=printSettings.labelInfo;
const isInside=printSettings.labelPos==='inside';
const insideColor=isInside?(printSettings.filled?textColor(c.hex):'#2a2520'):'';
const cStyle=insideColor?'style="color:'+insideColor+'"':'';
let info='';
if(li.code)info+=`<div class="swatch-code" ${cStyle}>${c.code}</div>`;
if(li.name)info+=`<div class="swatch-name" ${cStyle}>${c.name}</div>`;
if(li.hex)info+=`<div class="swatch-hex" ${cStyle}>${c.hex}</div>`;
if(li.old)info+=`<div class="swatch-old" ${cStyle}>${oldDisplay}</div>`;
let outline='';
if(shapeClass.includes('shape-clip')&&shapePaths[shapeName]){
  outline=`<div class="shape-outline"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="${shapePaths[shapeName]}" fill="none" stroke="#2a2520" stroke-width="1.5"/></svg></div>`;
}
el.innerHTML=`<div class="color-wrap"><div class="color-block ${shapeClass}" style="background:#${c.hex};${clipStyle}"><div class="copy-flash">copy #${c.hex}</div></div>${outline}</div><div class="swatch-info">${info}</div>`;
if(!printPanelOpen)el.addEventListener('click',()=>copyHex(c.hex,c.name));
return el;
}
function getSpacingGap(){
  if(printSettings.force1Page)return'1px';
  if(printSettings.spacing==='medium')return'1.5%';
  if(printSettings.spacing==='wide')return'3%';
  return'1px';
}
function makeGrid(colors,startIdx){
const g=document.createElement('div');g.className='grid';
const gap=printPanelOpen?getSpacingGap():'1px';
g.style.gap=gap;
const sorted=sortColors(colors,currentSort);
sorted.forEach((c,i)=>g.appendChild(makeSwatch(c,(startIdx||0)+i)));
return g;
}
function getPageDimsPx(){
  const ps=PAGE_SIZES[printSettings.pageSize]||PAGE_SIZES.letter;
  return{w:ps.w*96,h:ps.h*96,pad:0.4*96};
}
function makePages(displayColors){
  const dims=getPageDimsPx();
  const cw=dims.w-dims.pad*2, ch=dims.h-dims.pad*2;
  const lp=printSettings.labelPos;
  const blockH=112;
  let labelH=0;
  if(lp==='below'||lp==='above'){
    const li=printSettings.labelInfo;
    const lineH=14;
    let lines=0;
    if(li.code)lines++;if(li.name)lines++;if(li.hex)lines++;if(li.old)lines++;
    labelH=lines>0?12+lines*lineH:0; // 12px padding + lines
  }
  const swH=blockH+labelH;
  const swW=(lp==='left'||lp==='right')?200:112;
  const gapPct=printSettings.force1Page?0:printSettings.spacing==='wide'?0.03:printSettings.spacing==='medium'?0.015:0;
  const gapNum=gapPct>0?Math.round(cw*gapPct):1;
  const cols=Math.max(1,Math.floor((cw+gapNum)/(swW+gapNum)));
  const famHdrH=28;

  // Build a flat list of items: {type:'header',fam,meta} or {type:'swatch',color}
  const items=[];
  if(grouped){
    const famMap={};
    displayColors.forEach(c=>{(famMap[c.family]=famMap[c.family]||[]).push(c);});
    const famOrder=Object.keys(famMap).sort((a,b)=>((FAMILIES[a]||{order:99}).order)-((FAMILIES[b]||{order:99}).order));
    famOrder.forEach(fam=>{
      const meta=FAMILIES[fam]||{label:fam,desc:'',order:99};
      items.push({type:'header',fam,meta,count:famMap[fam].length});
      sortColors(famMap[fam],currentSort).forEach(c=>items.push({type:'swatch',color:c}));
    });
  } else {
    sortColors(displayColors,currentSort).forEach(c=>items.push({type:'swatch',color:c}));
  }

  // Flow items into pages
  const pages=[];
  let page=null,curY=0,colIdx=0,swatchIdx=0;

  function newPage(){
    page={el:document.createElement('div'),children:[]};
    page.el.className='page';
    page.el.style.width=dims.w+'px';page.el.style.height=dims.h+'px';
    pages.push(page);
    curY=0;colIdx=0;
  }

  function remainingH(){return ch-curY;}

  newPage();

  for(let i=0;i<items.length;i++){
    const item=items[i];
    if(item.type==='header'){
      // If we're mid-row, finish that row first
      if(colIdx>0){curY+=swH+gapNum;colIdx=0;}
      // If header + at least one row of swatches won't fit, start new page
      if(remainingH()<famHdrH+swH){newPage();}
      const hdr=document.createElement('div');
      hdr.style.cssText='font-size:.75rem;font-weight:500;padding:4px 0;line-height:1.3;';
      hdr.textContent=item.meta.label+' — '+item.meta.desc+' ('+item.count+')';
      page.children.push({el:hdr,y:curY});
      curY+=famHdrH;
    } else {
      // Swatch — check if new row is needed
      if(colIdx>=cols){curY+=swH+gapNum;colIdx=0;}
      // If this row won't fit, new page
      if(remainingH()<swH){newPage();}
      colIdx++;
      swatchIdx++;
    }
  }

  // Now actually build the DOM: re-flow to get correct grid chunks per page
  // We know the layout, so rebuild using the same logic but creating actual elements
  const frag=document.createDocumentFragment();

  const viewW=document.querySelector('.main').clientWidth-32;
  if(printSettings.force1Page){
    const pg=document.createElement('div');pg.className='page';
    pg.style.width=dims.w+'px';pg.style.height=dims.h+'px';
    const allSwatches=items.filter(it=>it.type==='swatch').map(it=>it.color);
    const grid=makeGrid(allSwatches,0);
    const neededRows=Math.ceil(allSwatches.length/cols);
    const neededH=neededRows*(swH+1);
    const contentScale=Math.min(1,ch/neededH,cw/(cols*(swW+1)));
    grid.style.transformOrigin='top left';
    grid.style.transform='scale('+contentScale+')';
    grid.style.width=(cw/contentScale)+'px';
    pg.appendChild(grid);
    const f1pNum=document.createElement('div');f1pNum.className='page-num';f1pNum.textContent='Page 1 of 1';
    pg.appendChild(f1pNum);
    const wrap=document.createElement('div');wrap.className='page-wrap';
    const pageScale=Math.min(1,viewW/dims.w);
    if(pageScale<1){
      pg.style.transform='scale('+pageScale+')';pg.style.transformOrigin='top center';
      wrap.style.width=dims.w*pageScale+'px';
      wrap.style.height=dims.h*pageScale+'px';
    }
    wrap.appendChild(pg);
    frag.appendChild(wrap);
    return frag;
  }

  // Flow layout pass — build actual pages with elements
  // Use explicit grid columns to guarantee CSS layout matches JS calculations
  const gridColStyle='repeat('+cols+','+swW+'px)';
  const gapStyle=gapNum+'px';
  let curPage=null,cy=0,ci=0,swBuf=[],globalIdx=0;
  const allPages=[];

  function flushSwatches(){
    if(swBuf.length===0)return;
    const g=document.createElement('div');g.className='grid';
    g.style.gap=gapStyle;
    g.style.gridTemplateColumns=gridColStyle;
    if(curPage.children.length>0)g.style.marginTop=gapStyle;
    swBuf.forEach(c=>g.appendChild(makeSwatch(c,c._flowIdx||0)));
    curPage.appendChild(g);
    swBuf=[];
  }
  function startPage(){
    flushSwatches();
    curPage=document.createElement('div');curPage.className='page';
    curPage.style.width=dims.w+'px';curPage.style.height=dims.h+'px';
    allPages.push(curPage);
    cy=0;ci=0;
  }
  function spaceLeft(){return ch-cy;}

  startPage();

  for(let i=0;i<items.length;i++){
    const item=items[i];
    if(item.type==='header'){
      // Flush any pending swatches from previous family
      if(ci>0){cy+=swH+gapNum;ci=0;}
      flushSwatches();
      // Need room for header + at least one row
      if(spaceLeft()<famHdrH+swH){startPage();}
      const hdr=document.createElement('div');
      hdr.style.cssText='font-size:.75rem;font-weight:500;padding:4px 0;line-height:1.3;';
      hdr.textContent=item.meta.label+' \u2014 '+item.meta.desc+' ('+item.count+')';
      curPage.appendChild(hdr);
      cy+=famHdrH;
    } else {
      if(ci>=cols){
        cy+=swH+gapNum;ci=0;
        flushSwatches();
      }
      if(spaceLeft()<swH){
        flushSwatches();
        startPage();
      }
      item.color._flowIdx=globalIdx++;
      swBuf.push(item.color);
      ci++;
    }
  }
  flushSwatches();

  // Add page numbers + wrap for responsive scaling
  allPages.forEach((pg,idx)=>{
    const num=document.createElement('div');num.className='page-num';
    num.textContent='Page '+(idx+1)+' of '+allPages.length;
    pg.appendChild(num);
    const wrap=document.createElement('div');wrap.className='page-wrap';
    const scale=Math.min(1,viewW/dims.w);
    if(scale<1){
      pg.style.transform='scale('+scale+')';
      wrap.style.width=dims.w*scale+'px';
      wrap.style.height=dims.h*scale+'px';
    }
    wrap.appendChild(pg);
    frag.appendChild(wrap);
  });

  return frag;
}
function famRep(colors){const s=[...colors].sort((a,b)=>brightness(a.hex)-brightness(b.hex));return s[Math.floor(s.length/2)].hex;}

function buildFamilyToolbar(){
const tb=document.getElementById('familyToolbar');
tb.innerHTML='';
// All / None buttons
const allNone=document.createElement('div');allNone.className='fam-all-none btn-group';
const btnAll=document.createElement('button');btnAll.className='tog-btn';btnAll.textContent='All';btnAll.onclick=()=>setAllFamilies(true);
const btnNone=document.createElement('button');btnNone.className='tog-btn';btnNone.textContent='None';btnNone.onclick=()=>setAllFamilies(false);
allNone.appendChild(btnAll);allNone.appendChild(btnNone);
tb.appendChild(allNone);
// chips for each family present in filtered data
const famSet=new Set(filtered.map(c=>c.family));
const famOrder=[...famSet].sort((a,b)=>((FAMILIES[a]||{order:99}).order)-((FAMILIES[b]||{order:99}).order));
famOrder.forEach(fam=>{
const meta=FAMILIES[fam]||{label:fam,desc:'',order:99};
const colors=filtered.filter(c=>c.family===fam);
const rep=famRep(colors);
const chip=document.createElement('button');
chip.className='fam-chip'+(activeFamilies.has(fam)?'':' off');
chip.dataset.fam=fam;
chip.innerHTML=`<span class="chip-dot" style="background:#${rep}"></span>${meta.label}`;
chip.onclick=()=>toggleFamily(fam);
tb.appendChild(chip);
});
}

function updateStickyTops(){
  const hdr=document.querySelector('header');
  const tb=document.getElementById('familyToolbar');
  const pp=document.getElementById('printPanel');
  const hH=hdr.offsetHeight;
  let top=hH;
  if(tb.classList.contains('visible')){tb.style.top=top+'px';top+=tb.offsetHeight;}
  if(pp.classList.contains('visible')){pp.style.top=top+'px';}
}
function render(){
const content=document.getElementById('content'),noR=document.getElementById('no-results'),tb=document.getElementById('familyToolbar');
content.innerHTML='';
if(filtered.length===0){noR.style.display='block';document.getElementById('count').textContent='0 shown';tb.classList.remove('visible');return;}
noR.style.display='none';

// get the colors to display
let displayColors;
if(!grouped){
  tb.classList.remove('visible');
  displayColors=filtered;
} else {
  tb.classList.add('visible');
  buildFamilyToolbar();
  displayColors=filtered.filter(c=>activeFamilies.has(c.family));
}
document.getElementById('count').textContent=`${displayColors.length} shown`;
if(displayColors.length===0){noR.style.display='block';return;}

// print preview — paged layout
if(printPanelOpen){
  content.appendChild(makePages(displayColors));
  return;
}

// normal mode — free-flowing grid
if(!grouped){
  content.appendChild(makeGrid(displayColors));
} else {
  const famMap={};
  displayColors.forEach(c=>{(famMap[c.family]=famMap[c.family]||[]).push(c);});
  const famOrder=Object.keys(famMap).sort((a,b)=>((FAMILIES[a]||{order:99}).order)-((FAMILIES[b]||{order:99}).order));
  famOrder.forEach(fam=>{
    const meta=FAMILIES[fam]||{label:fam,desc:'',order:99};
    const section=document.createElement('div');section.className='group-section';section.id=`fam-${fam}`;
    const hdr=document.createElement('div');hdr.className='group-header';
    hdr.innerHTML=`<div class="group-title">${meta.label} <span style="font-weight:300;font-size:.82rem;font-family:'DM Mono',monospace"> ${meta.desc}</span></div><span class="group-count">${famMap[fam].length} colors</span>`;
    section.appendChild(hdr);section.appendChild(makeGrid(famMap[fam]));
    content.appendChild(section);
  });
}
requestAnimationFrame(updateStickyTops);
}

document.getElementById('search').addEventListener('input',function(){applyFilters();});
document.getElementById('sort').addEventListener('change',function(){currentSort=this.value;render();});
function setGroup(on){grouped=on;document.getElementById('btn-flat').classList.toggle('active',!on);document.getElementById('btn-group').classList.toggle('active',on);render();}
function copyHex(hex,name){navigator.clipboard.writeText('#'+hex).then(()=>showToast(`copied #${hex} · ${name}`));}
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1800);}
loadShapes();
updateSubtitle();
render();
</script>
